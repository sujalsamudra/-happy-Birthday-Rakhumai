<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rakhumai 💗</title
    <meta property="og:title" content="Happy Birthday Rakhumai 💗">
<meta property="og:description" content="A small surprise made with love 🎁✨">
<meta property="og:image" content="https://sujalsamudra.github.io/happy-Birthday-Rakhumai/Photo.jpg">
<meta property="og:url" content="https://sujalsamudra.github.io/happy-Birthday-Rakhumai/">
<meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Happy Birthday, Rakhumai 🎂💗</h1>
        <p class="sub">Hope you like it ✨</p>

        <button onclick="revealSurprise()">Message for you 🎁</button>

        <div id="surprise" class="hidden">
            <img src="Photo.jpg" class="Photo" onclick="showMessage()">
            <p>
                You are truly someone special, and I just wanted to do something small 
                to make you smile today. I hope this year brings you happiness 
                and everything your heart wishes for 💖 keep smiling 👀
            </p>
        </div>
    </div>

    <!-- Popup -->
    <div id="popup" class="popup hidden">
        <div class="popup-box">
            <p>You are the most beautiful part of my world 💗</p>
            <button onclick="closePopup()">Close 💖</button>
        </div>
    </div>

    <!-- Music -->
    <audio id="song" src="Song.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
